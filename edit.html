<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Student</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f9f9f9; }
        .form-section { background: #fff; padding: 20px; border-radius: 5px; max-width: 400px; box-shadow: 0 0 10px rgba(0,0,0,0.1); margin: 0 auto; }
        input, button { display: block; width: 95%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        a { display: inline-block; margin-top: 10px; color: #555; text-decoration: none; }
    </style>
</head>
<body>

    <div class="form-section">
        <h2>Edit Student Details</h2>
        <p><strong>Roll Number:</strong> {{ student['roll_number'] }} (Cannot be changed)</p>
        
        <form method="POST">
            <label>Student Name:</label>
            <input type="text" name="name" value="{{ student['name'] }}" required>
            
            <label>Course:</label>
            <input type="text" name="course" value="{{ student['course'] }}" required>
            
            <button type="submit">Update Details</button>
        </form>
        
        <a href="/">← Back to Dashboard</a>
    </div>

</body>
</html>
