<<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Management System</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f9f9f9; }
        h1 { color: #1e3d59; }
        .form-section { background: #fff; padding: 20px; border-radius: 5px; margin-bottom: 20px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input, button { padding: 10px; margin: 5px; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #17b978; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #139a63; }
        table { width: 100%; border-collapse: collapse; background: white; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #1e3d59; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        .btn-delete { color: #ff4d4d; text-decoration: none; font-weight: bold; }
        .btn-edit { color: #007bff; text-decoration: none; font-weight: bold; margin-right: 10px; }
    </style>
</head>
<body>

    <h1>Welcome to Student Management System</h1>

    <div class="form-section">
        <h3>Add New Student</h3>
        <form action="/add" method="POST">
            <input type="text" name="name" placeholder="Student Name" required>
            <input type="text" name="roll_number" placeholder="Roll Number" required>
            <input type="text" name="course" placeholder="Course" required>
            <button type="submit">Add Student</button>
        </form>
    </div>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Roll Number</th>
                <th>Course</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for student in students %}
            <tr>
                <td>{{ student['name'] }}</td>
                <td>{{ student['roll_number'] }}</td>
                <td>{{ student['course'] }}</td>
                <td>
                    <a class="btn-edit" href="/edit/{{ student['roll_number'] }}">Edit</a>
                    <a class="btn-delete" href="/delete/{{ student['roll_number'] }}" onclick="return confirm('Are you sure you want to delete this student?');">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</body>
</html>
